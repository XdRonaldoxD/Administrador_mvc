<div class="container-login">
    <div class="forms-container">
        <div class="signin-signup">
            <form class="sign-in-form" [formGroup]="loginForm" autocomplete="nope">
                <h2 class="title">Iniciar Sesión</h2>
                <div class="input-field" [class.is-invalid]="loginForm.controls['dni']|isInvalid">
                    <i class="fa fa-user" aria-hidden="true"></i>
                    <input type="text" inputmode="numeric" maxlength="8" formControlName="dni" [autocomplete]="true"
                        placeholder="DNI" />
                </div>
                <div class="text-danger">
                    <div style="font-weight: 700;" *ngIf="loginForm.controls['dni']|hasError:'required'">
                        Ingresa tu DNI
                    </div>
                    <div style="font-weight: 700;" *ngIf="loginForm.controls['dni']|hasError:'pattern'">
                        El DNI debe tener 8 dígitos
                    </div>
                </div>
                <div class="input-field">
                    <i class="fa fa-unlock-alt" aria-hidden="true"></i>
                    <input type="password" placeholder="Contraseña"
                        [class.is-invalid]="loginForm.controls['password']|isInvalid" formControlName="password" />
                </div>
                <div class="text-danger">
                    <div style="font-weight: 700;" *ngIf="loginForm.controls['password']|hasError:'required'">
                        Contraseña Vacia
                    </div>
                </div>
                <button *ngIf="!loading" type="button" (click)="login()" class="btn-login solid">
                    INGRESAR
                </button>
                <button *ngIf="loading" type="button" class="btn-login solid"><em
                        class="fa fa-spin fa-circle-o-notch"></em>
                    Iniciando...
                </button>

            </form>
            <form class="sign-up-form" [formGroup]="registrarForm" autocomplete="nope">
                <h2 class="title">Registrarse</h2>
                <div class="input-field">
                    <i class="fa fa-user"></i>
                    <input type="text" formControlName="nombre"
                        [class.is-invalid]="registrarForm.controls['nombre']|isInvalid" placeholder="Nombre" />
                </div>
                <div class="text-danger">
                    <div *ngIf="registrarForm.controls['nombre']|hasError:'required'">
                        Nombre Vacia
                    </div>
                </div>
                <div class="input-field">
                    <i class="fa fa-envelope" aria-hidden="true"></i>
                    <input type="email" formControlName="email"
                        [class.is-invalid]="registrarForm.controls['email']|isInvalid" placeholder="Email" />
                </div>
                <div class="text-danger">
                    <div *ngIf="registrarForm.controls['email']|hasError:'required'">
                        Correo Vacia
                    </div>
                    <div *ngIf="registrarForm.controls['email']|hasError:'email'">
                        Correo Incorrecto
                    </div>
                </div>
                <div class="input-field">
                    <i class="fa fa-lock"></i>
                    <input type="password" formControlName="password"
                        [class.is-invalid]="registrarForm.controls['password']|isInvalid" placeholder="Contraseña" />
                </div>
                <div class="text-danger">
                    <div *ngIf="registrarForm.controls['password']|hasError:'required'">
                        Contraseña Vacia
                    </div>
                </div>
                <input type="button" class="btn-login" value="Registrar" (click)="RegistrarSession()" />

            </form>
        </div>
    </div>

    <div class="panels-container">
        <div class="panel left-panel">
            <!-- <div class="content">
                <h3>Nuevo Aqui ?</h3>
                <button class="btn-login transparent" id="sign-up-btn">
                    REGISTRARSE
                </button>
            </div> -->
            <img src="../../assets/img/log.svg" class="image" alt="" />
        </div>
        <div class="panel right-panel">
            <div class="content">
                <h3>Ya estas registrado?</h3>
                <button class="btn-login transparent" id="sign-in-btn">
                    INICIAR SESIÓN
                </button>
            </div>
            <img src="../../assets/img/register.svg" class="image" alt="" />
        </div>
    </div>
</div>



<div class="modal fade" id="exampleModalCenter" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenter"
    aria-hidden="true">

                                style="enable-background:new 0 0 512 512;" xml:space="preserve">
                                <linearGradient id="SVGID_1_" gradientUnits="userSpaceOnUse" x1="256" y1="514" x2="256"
                                    y2="2" gradientTransform="matrix(1 0 0 -1 0 514)">

                                c0,11.028,8.972,20,20,20h392c11.028,0,20-8.972,20-20V60c0-11.028-8.972-20-20-20H60c-11.028,0-20,8.972-20,20v80H0V60
                                C0,26.916,26.916,0,60,0h392C485.084,0,512,26.916,512,60z M211.716,352L240,380.284L364.284,256L240,131.716L211.716,160l76,76H0
                                v40h287.716L211.716,352z" />
                                <g>
                                </g>

                    </div>

                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" type="button" data-dismiss="modal" data-original-title=""
                        title="">Salir</button>
                    <button class="btn btn-primary" type="submit" data-original-title="" title="">Cerrar
                        Sesión</button>
                </div>
            </div>
        </form>
    </div>
</div>
