<header class="topbar">
    <nav class="navbar top-navbar navbar-expand-md navbar-light">
        <!-- ============================================================== -->
        <!-- Logo -->
        <!-- ============================================================== -->
        <div class="navbar-header">
            <!-- [LOGO] Logo de la empresa (cargado en Empresa > Imágenes). Si no hay, usa
                 una imagen por defecto. Al hacer click navega al inicio del sistema. -->
            <a class="navbar-brand" routerLink="/inicio" style="cursor:pointer;">
                <img [src]="logoEmpresa" (error)="onLogoError($event)" alt="logo empresa"
                    class="logo-empresa" />
            </a>
        </div>
        <!-- ============================================================== -->
        <!-- End Logo -->
        <!-- ============================================================== -->
        <div class="navbar-collapse">
            <!-- ============================================================== -->
            <!-- toggle and nav items -->
            <!-- ============================================================== -->
            <ul class="navbar-nav mr-auto">
                <!-- This is  -->
                <li class="nav-item"> <a class="nav-link nav-toggler hidden-md-up waves-effect waves-dark"
                        href="javascript:void(0)"><i class="ti-menu"></i></a> </li>
                <li class="nav-item"> <a class="nav-link sidebartoggler hidden-sm-down waves-effect waves-dark"
                        href="javascript:void(0)"><i class="ti-menu"></i></a> </li>
                <li class="nav-item hidden-sm-down"></li>
            </ul>
            <!-- ============================================================== -->
            <!-- User profile and search -->
            <!-- ============================================================== -->
            <ul class="navbar-nav my-lg-0">
                <!-- ============================================================== -->


                <!-- ============================================================== -->
                <!-- ============================================================== -->
                <!-- Messages -->
                <!-- ============================================================== -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle waves-effect waves-dark" href="" id="2" data-toggle="dropdown"
                        aria-haspopup="true" aria-expanded="false"> <i class="mdi mdi-email"></i>
                        <div class="notify" [innerHtml]="notficarChat"> </div>
                    </a>
                    <div class="dropdown-menu mailbox dropdown-menu-right animated bounceInDown" aria-labelledby="2">
                        <ul>
                            <li>
                                <div class="drop-title">Tiene {{cantidad_mensajes}} nuevo(s) mensaje(s)</div>
                            </li>
                            <li>
                                <div #agregar_mensaje class="message-center" [innerHTML]="construirMensaje">

                                </div>
                            </li>
                        </ul>
                    </div>
                </li>
                <!-- ============================================================== -->
                <!-- End Messages -->
                <!-- ============================================================== -->
                <!-- ============================================================== -->
                <!-- Profile -->
                <!-- ============================================================== -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle waves-effect waves-dark" href="" data-toggle="dropdown"
                        aria-haspopup="true" aria-expanded="false"><img src="assets/assets/images/users/1.jpg"
                            alt="user" class="profile-pic" /></a>
                    <div class="dropdown-menu dropdown-menu-right animated flipInY">
                        <ul class="dropdown-user">
                            <li>
                                <div class="dw-user-box">
                                    <div class="u-img"><img src="assets/assets/images/users/1.jpg" alt="user"></div>
                                    <div class="u-text">
                                        <h4>{{identificacion.nombre}} {{identificacion.apellido_paterno}}
                                            {{identificacion.apellido_materno}}</h4>
                                        <p class="text-muted">{{identificacion.email}}</p>
                                    </div>
                                </div>
                            </li>
                            <li role="separator" class="divider"></li>
                            <li><a routerLink="/Datos-Personales/{{identificacion.sub}}"><i class="ti-user"></i> Mi
                                    Datos Personales</a></li>
                            <li role="separator" class="divider"></li>
                            <li style="cursor:pointer;" (click)="cerrarSession()"><a><i class="fa fa-power-off"></i>
                                    Salir</a></li>
                        </ul>
                    </div>
                </li>
            </ul>
        </div>
    </nav>
</header>
