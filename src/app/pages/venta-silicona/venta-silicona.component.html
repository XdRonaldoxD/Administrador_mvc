<div class="container-fluid py-3">

  <div class="card text-white mb-3" style="background:#185FA5">
    <div class="card-body py-3 d-flex align-items-center">
      <i class="fa fa-tint mr-2" style="font-size:22px"></i>
      <h4 class="m-0 text-white">Venta silicona</h4>
    </div>
  </div>

  <div class="alert alert-danger d-flex align-items-center" *ngIf="!id_caja">
    <i class="fa fa-exclamation-triangle mr-2"></i>
    <span>No tienes una caja abierta.</span>
    <button class="btn btn-sm btn-danger ml-auto" (click)="router.navigate(['Caja'])">Abrir caja</button>
  </div>

  <div class="row">

    <div class="col-12 col-lg-7">
      <p class="text-muted font-weight-bold mb-2">1. Toca el sabor</p>
      <div class="row">
        <div class="col-6 col-sm-4 col-xl-3 mb-3" *ngFor="let p of productos">
          <button type="button"
                  class="vs-flav btn btn-block text-left h-100"
                  [disabled]="p.total_stock_producto_bodega <= 0"
                  [class.vs-flav--sel]="seleccionado && seleccionado.id_producto === p.id_producto"
                  [style.background]="estiloSabor(p.glosa_producto).background"
                  [style.borderColor]="estiloSabor(p.glosa_producto).border"
                  [style.color]="estiloSabor(p.glosa_producto).color"
                  (click)="seleccionar(p)">
            <div class="vs-flav-nombre">{{ sabor(p.glosa_producto) }}</div>
            <div class="vs-flav-stock">{{ p.total_stock_producto_bodega }} oz</div>
          </button>
        </div>
      </div>
      <p class="text-muted" *ngIf="productos.length === 0">No hay sabores de silicona cargados.</p>
    </div>

    <div class="col-12 col-lg-5" *ngIf="seleccionado">
      <div class="card">
        <div class="card-body">
          <p class="text-muted font-weight-bold mb-2">2. Elige el tamaño</p>
          <div class="row mb-3">
            <div class="col-6" *ngFor="let t of tamanos">
              <button type="button" class="btn btn-outline-primary btn-block vs-size"
                      [class.active]="onzas === t.oz"
                      (click)="elegirTamano(t.oz)">
                <span class="d-block font-weight-bold">{{ t.label }}</span>
                <small>{{ t.oz }} oz · S/{{ (t.oz * seleccionado.precioventa_stock_producto_bodega) | number:'1.2-2' }}</small>
              </button>
            </div>
          </div>

          <p class="text-muted font-weight-bold mb-2">O ajusta las onzas</p>

          <div class="vs-stepper d-flex align-items-center justify-content-between">
            <button type="button" class="vs-step" (click)="menos()" aria-label="Quitar una onza">−</button>
            <div class="text-center">
              <div class="vs-onzas-num">{{ onzas }}</div>
              <div class="text-muted small">onzas</div>
            </div>
            <button type="button" class="vs-step" (click)="mas()" aria-label="Agregar una onza">+</button>
          </div>

          <div class="d-flex justify-content-between align-items-end my-3">
            <div>
              <div class="text-muted small">Sabor</div>
              <div class="h5 m-0">{{ sabor(seleccionado.glosa_producto) }}</div>
            </div>
            <div class="text-right">
              <div class="text-muted small">Total</div>
              <div class="vs-total">S/{{ total | number:'1.2-2' }}</div>
            </div>
          </div>

          <button type="button" class="btn btn-success btn-lg btn-block" (click)="cobrar()" [disabled]="cobrando">
            <i class="fa fa-money mr-2"></i>{{ cobrando ? 'Cobrando...' : 'Cobrar' }}
          </button>
        </div>
      </div>
    </div>

  </div>

  <p class="text-success font-weight-bold text-center mt-2" *ngIf="mensajeOk">✓ {{ mensajeOk }}</p>
</div>
